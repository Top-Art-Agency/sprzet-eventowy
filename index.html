<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprzęt Eventowy — Inwentaryzacja</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ─── KONFIGURACJA: wklej swoje klucze tutaj ─── */
/* Patrz: README / sekcja konfiguracji poniżej     */

:root {
  --radius: 10px;
  --radius-lg: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --accent: #7c6af7;
  --accent2: #a598ff;
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.12);
  --purple: #c084fc;
  --purple-bg: rgba(192,132,252,0.12);
}

/* ─── DARK (domyślny) ─── */
html.dark {
  --bg: #0f0f11;
  --bg2: #18181c;
  --bg3: #222228;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eff4;
  --text2: #9997a8;
  --text3: #5e5c6e;
}

/* ─── LIGHT ─── */
html.light {
  --bg: #f5f4f7;
  --bg2: #ffffff;
  --bg3: #eeedf2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #111018;
  --text2: #5c5a6e;
  --text3: #9997a8;
  --green: #16a05e;
  --green-bg: rgba(22,160,94,0.10);
  --amber: #b45309;
  --amber-bg: rgba(180,83,9,0.10);
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.10);
  --purple: #7c3aed;
  --purple-bg: rgba(124,58,237,0.10);
  --accent: #5b4de0;
  --accent2: #4338ca;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ─── LAYOUT ─── */
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; width: 220px; height: 100vh; z-index: 100; }
.main { margin-left: 220px; padding: 32px 36px; }

/* ─── SIDEBAR ─── */
.logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
.logo-mark { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.logo-name { font-size: 16px; font-weight: 600; }
.nav { padding: 16px 12px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(124,106,247,0.15); color: var(--accent2); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-section { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 14px 12px 6px; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.user-row { display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(124,106,247,0.25); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--accent2); flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; }
.user-role { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* ─── TOPBAR ─── */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 22px; font-weight: 600; }
.page-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
.topbar-actions { display: flex; gap: 8px; }

/* ─── BUTTONS ─── */
.btn { height: 36px; padding: 0 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; color: var(--text); font-family: var(--font); font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: rgba(255,255,255,0.25); background: var(--bg3); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-sm { height: 30px; padding: 0 12px; font-size: 13px; }
.btn-ghost { border-color: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--bg3); border-color: var(--border); }
.btn-danger { color: var(--red); border-color: rgba(248,113,113,0.25); }
.btn-danger:hover { background: var(--red-bg); }
.btn svg { width: 14px; height: 14px; }

/* ─── STATS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
.stat-label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; margin-bottom: 8px; }
.stat-val { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.stat-card.s-ok .stat-val { color: var(--green); }
.stat-card.s-low .stat-val { color: var(--amber); }
.stat-card.s-repair .stat-val { color: var(--purple); }
.stat-card.s-total .stat-val { color: var(--text); }

/* ─── FILTERS ─── */
.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filters input, .filters select { height: 36px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; padding: 0 12px; outline: none; transition: border-color .15s; }
.filters input { flex: 1; min-width: 200px; }
.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--text3); }
.filters select option { background: var(--bg2); }

/* ─── TABLE ─── */
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: .07em; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg2); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
td { padding: 12px 16px; vertical-align: middle; }
td.name { font-weight: 500; }
td.mono { font-family: var(--mono); font-size: 12px; color: var(--text2); }
td.muted { color: var(--text2); font-size: 13px; }
.empty { padding: 60px 20px; text-align: center; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ─── BADGES ─── */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--mono); }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-ok::before { background: var(--green); }
.badge-low { background: var(--amber-bg); color: var(--amber); }
.badge-low::before { background: var(--amber); }
.badge-brak { background: var(--red-bg); color: var(--red); }
.badge-brak::before { background: var(--red); }
.badge-repair { background: var(--purple-bg); color: var(--purple); }
.badge-repair::before { background: var(--purple); }

/* ─── MODAL ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; }
.modal-close:hover { color: var(--text); background: var(--bg3); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ─── FORM ─── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text2); font-family: var(--mono); letter-spacing: .05em; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; padding: 9px 12px; outline: none; transition: border-color .15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg2); }
.field textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

/* ─── HISTORY PANEL ─── */
.history-list { display: flex; flex-direction: column; gap: 0; }
.history-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
.hist-body { flex: 1; }
.hist-action { font-size: 13px; font-weight: 500; }
.hist-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 3px; }
.hist-detail { font-size: 12px; color: var(--text2); margin-top: 4px; background: var(--bg3); padding: 6px 10px; border-radius: 6px; font-family: var(--mono); }

/* ─── TABS ─── */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
.tab { padding: 7px 18px; border-radius: 7px; cursor: pointer; font-size: 14px; color: var(--text2); border: none; background: none; font-family: var(--font); transition: all .15s; }
.tab.active { background: var(--bg3); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

/* ─── CONFIG SCREEN ─── */
.config-screen { max-width: 560px; margin: 60px auto; }
.config-screen h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.config-screen p { color: var(--text2); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.config-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
.config-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
.code-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--accent2); margin-bottom: 20px; white-space: pre; overflow-x: auto; line-height: 1.7; }
.step { display: flex; gap: 14px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(124,106,247,0.2); color: var(--accent2); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--mono); }
.step-content h3 { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
.step-content p { font-size: 13px; color: var(--text2); line-height: 1.6; }
.step-content a { color: var(--accent2); }

/* ─── SPINNER ─── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }

/* ─── TOAST ─── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; animation: slideIn .2s ease; min-width: 240px; }
.toast.success { border-color: rgba(52,211,153,.3); }
.toast.error { border-color: rgba(248,113,113,.3); color: var(--red); }
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── EVENT TAG ─── */
.event-tag { display: inline-block; background: rgba(124,106,247,.15); color: var(--accent2); font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 4px; }

/* ─── THEME TOGGLE ─── */
.theme-toggle { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; }
.theme-toggle:hover { background:var(--bg3); color:var(--text); }
.theme-toggle svg { width:15px; height:15px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px 16px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>

<!-- ════════════════════════════════════════════
     KONFIGURACJA — wklej swoje klucze Supabase
     ════════════════════════════════════════════ -->
<script>
const SUPABASE_URL    = 'https://yxbwhwmntvdzvwlancz.supabase.co';
const SUPABASE_ANON   = 'sb_publishable_4405JE3W_MqZ2JtFHLnHhA_mOJ2S5n2';
const APP_VERSION     = '1.0.0';
</script>

<!-- ════ APP ════ -->
<div id="app"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ─── SUPABASE INIT ───
let sb;
try {
  if (SUPABASE_URL !== 'TWOJ_SUPABASE_URL') {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      global: {
        headers: { 'apikey': SUPABASE_ANON }
      }
    });
  }
} catch(e) { console.error('Supabase init error:', e); }

// ─── STATE ───
let state = {
  view: 'inventory',      // inventory | history | events | categories
  items: [],
  history: [],
  events: [],
  categories: [],
  loading: true,
  search: '',
  filterKat: '',
  filterStan: '',
  modal: null,            // null | 'add' | 'edit' | 'event-add' | 'detail' | 'cat-add'
  editItem: null,
  detailItem: null,
  currentUser: localStorage.getItem('eq_user') || '',
};

// ─── TOAST ───
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':'✕'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── DB HELPERS ───
async function loadItems() {
  if (!sb) return;
  const { data, error } = await sb.from('equipment').select('*').order('created_at', { ascending: false });
  if (!error) state.items = data || [];
}

async function loadHistory() {
  if (!sb) return;
  const { data, error } = await sb.from('equipment_history').select('*').order('created_at', { ascending: false }).limit(200);
  if (!error) state.history = data || [];
}

async function loadEvents() {
  if (!sb) return;
  const { data, error } = await sb.from('events').select('*').order('date_start', { ascending: false });
  if (!error) state.events = data || [];
}

async function loadCategories() {
  if (!sb) return;
  const { data, error } = await sb.from('categories').select('*').order('nazwa');
  if (!error) state.categories = data || [];
}

async function loadAll() {
  state.loading = true; render();
  await Promise.all([loadItems(), loadHistory(), loadEvents(), loadCategories()]);
  state.loading = false; render();
}

async function saveItem(item, isEdit) {
  if (!sb) { toast('Brak połączenia z bazą', 'error'); return false; }
  const user = state.currentUser || 'nieznany';
  if (isEdit) {
    const old = state.items.find(i => i.id === item.id);
    const { error } = await sb.from('equipment').update(item).eq('id', item.id);
    if (error) { toast('Błąd zapisu: ' + error.message, 'error'); return false; }
    // historia
    const changes = [];
    ['nazwa','kategoria','ilosc','stan','lokalizacja','sn','event_id','uwagi'].forEach(k => {
      if (String(old[k]||'') !== String(item[k]||'')) changes.push(`${k}: "${old[k]||''}" → "${item[k]||''}"`);
    });
    await sb.from('equipment_history').insert({ equipment_id: item.id, action: 'edycja', user_name: user, details: changes.join('; ') || 'brak zmian' });
    toast('Zapisano zmiany');
  } else {
    const { data, error } = await sb.from('equipment').insert(item).select().single();
    if (error) { toast('Błąd zapisu: ' + error.message, 'error'); return false; }
    await sb.from('equipment_history').insert({ equipment_id: data.id, action: 'dodanie', user_name: user, details: `Dodano: ${item.nazwa}` });
    toast('Dodano sprzęt');
  }
  return true;
}

async function deleteItem(id) {
  if (!sb) return;
  const item = state.items.find(i => i.id === id);
  await sb.from('equipment_history').insert({ equipment_id: id, action: 'usunięcie', user_name: state.currentUser || 'nieznany', details: `Usunięto: ${item?.nazwa}` });
  await sb.from('equipment').delete().eq('id', id);
  toast('Usunięto pozycję');
  await loadItems(); await loadHistory(); render();
}

async function saveEvent(ev) {
  if (!sb) return false;
  const { error } = await sb.from('events').insert(ev);
  if (error) { toast('Błąd: ' + error.message, 'error'); return false; }
  toast('Dodano event');
  return true;
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  if (!SUPABASE_URL || SUPABASE_URL === 'TWOJ_SUPABASE_URL') {
    app.innerHTML = renderConfig(); return;
  }
  if (!state.currentUser) {
    app.innerHTML = renderUserPrompt(); return;
  }
  app.innerHTML = `
    <div class="layout">
      ${renderSidebar()}
      <main class="main">
        ${renderMain()}
      </main>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
  bindEvents();
}

function renderConfig() {
  return `<div style="padding:32px"><div class="config-screen">
    <h1>Konfiguracja aplikacji</h1>
    <p>Przed uruchomieniem uzupełnij klucze Supabase w pliku HTML (sekcja KONFIGURACJA na górze pliku) oraz utwórz tabele w bazie danych.</p>
    <div class="config-card">
      <h2>Krok 1 — Utwórz projekt Supabase</h2>
      <div class="step"><div class="step-num">1</div><div class="step-content"><h3>Załóż konto</h3><p>Wejdź na <a href="https://supabase.com" target="_blank">supabase.com</a> i utwórz darmowe konto. Następnie utwórz nowy projekt.</p></div></div>
      <div class="step"><div class="step-num">2</div><div class="step-content"><h3>Skopiuj klucze</h3><p>Project Settings → API → skopiuj <strong>Project URL</strong> i <strong>anon public key</strong>. Wklej je w sekcji KONFIGURACJA w tym pliku HTML.</p></div></div>
      <div class="step"><div class="step-num">3</div><div class="step-content"><h3>Utwórz tabele (SQL Editor)</h3><p>W Supabase otwórz SQL Editor i wklej poniższy kod:</p></div></div>
      <div class="code-block">-- Tabela sprzętu
CREATE TABLE equipment (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at timestamptz DEFAULT now(),
  nazwa text NOT NULL,
  kategoria text,
  ilosc integer DEFAULT 1,
  stan text DEFAULT 'OK',
  lokalizacja text,
  sn text,
  event_id uuid,
  data_wypozyczenia date,
  data_zwrotu date,
  uwagi text
);

-- Tabela eventów
CREATE TABLE events (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at timestamptz DEFAULT now(),
  nazwa text NOT NULL,
  miasto text,
  date_start date,
  date_end date,
  uwagi text
);

-- Tabela historii zmian
CREATE TABLE equipment_history (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at timestamptz DEFAULT now(),
  equipment_id uuid,
  action text,
  user_name text,
  details text
);

-- Zezwól na odczyt/zapis dla wszystkich (uprość dla wewnętrznego narzędzia)
ALTER TABLE equipment ENABLE ROW LEVEL SECURITY;
ALTER TABLE events ENABLE ROW LEVEL SECURITY;
ALTER TABLE equipment_history ENABLE ROW LEVEL SECURITY;

CREATE POLICY "public_all" ON equipment FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "public_all" ON events FOR ALL USING (true) WITH CHECK (true);

// ─── ACTIONS ───
function openModal(type) { state.modal = type; render(); }
function closeModal(e) { if (e && e.target !== e.currentTarget) return; state.modal=null; state.editItem=null; render(); }
function openEdit(id) { state.editItem = state.items.find(i=>i.id===id); state.modal='edit'; render(); }
function openDetail(id) { state.detailItem = state.items.find(i=>i.id===id); state.modal='detail'; render(); }
function setView(v) { state.view=v; render(); }
function logout() { localStorage.removeItem('eq_user'); state.currentUser=''; render(); }

async function submitItem() {
  const nazwa = document.getElementById('f-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę sprzętu','error'); return; }
  const item = {
    nazwa,
    kategoria: document.getElementById('f-kat').value||null,
    ilosc: parseInt(document.getElementById('f-ilosc').value)||1,
    stan: document.getElementById('f-stan').value,
    lokalizacja: document.getElementById('f-lok').value.trim()||null,
    sn: document.getElementById('f-sn').value.trim()||null,
    event_id: document.getElementById('f-event').value||null,
    data_wypozyczenia: document.getElementById('f-wyp').value||null,
    data_zwrotu: document.getElementById('f-zwrot').value||null,
    uwagi: document.getElementById('f-uwagi').value.trim()||null,
  };
  if (state.modal === 'edit') item.id = state.editItem.id;
  const ok = await saveItem(item, state.modal==='edit');
  if (ok) { state.modal=null; state.editItem=null; await loadItems(); await loadHistory(); render(); }
}

async function submitEvent() {
  const nazwa = document.getElementById('e-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę eventu','error'); return; }
  const ev = {
    nazwa,
    miasto: document.getElementById('e-miasto').value.trim()||null,
    date_start: document.getElementById('e-start').value||null,
    date_end: document.getElementById('e-end').value||null,
    uwagi: document.getElementById('e-uwagi').value.trim()||null,
  };
  const ok = await saveEvent(ev);
  if (ok) { state.modal=null; await loadEvents(); render(); }
}

function confirmDelete(id) {
  if (confirm('Na pewno usunąć tę pozycję? Operacja jest nieodwracalna.')) deleteItem(id);
}

function exportCSV() {
  if (!state.items.length) { toast('Brak danych','error'); return; }
  const evMap = {};
  state.events.forEach(e => evMap[e.id] = e.nazwa);
  const head = ['Nazwa','Kategoria','Ilość','Stan','Lokalizacja','Nr seryjny','Event','Wypożyczono','Zwrot','Uwagi'];
  const rows = state.items.map(i => [
    i.nazwa, i.kategoria, i.ilosc, i.stan, i.lokalizacja, i.sn,
    i.event_id ? evMap[i.event_id]||'' : '', i.data_wypozyczenia, i.data_zwrotu, i.uwagi
  ].map(v => '"'+(v||'').toString().replace(/"/g,'""')+'"').join(','));
  const csv = '\uFEFF' + [head.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'sprzet_eventowy_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('Eksport gotowy');
}

      <div class="modal-header">
        <h3>${isEdit?'Edytuj kategorię':'Nowa kategoria'}</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Nazwa kategorii *</label><input id="c-nazwa" value="${esc(c.nazwa||'')}" placeholder="np. Nagłośnienie, Scena, Catering..."></div>
        <div class="field"><label>Opis (opcjonalnie)</label><textarea id="c-opis" placeholder="Krótki opis co wchodzi w tę kategorię">${esc(c.opis||'')}</textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Anuluj</button>
        <button class="btn btn-primary" onclick="submitCat(${isEdit})">Zapisz</button>
      </div>
    </div>
  </div>`;
}

async function submitCat(isEdit=false) {
  const nazwa = document.getElementById('c-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę kategorii','error'); return; }
  const opis = document.getElementById('c-opis')?.value?.trim()||null;
  if (!sb) return;
  if (isEdit) {
    const { error } = await sb.from('categories').update({nazwa, opis}).eq('id', state._catEditId);
    if (error) { toast('Błąd: '+error.message,'error'); return; }
    toast('Zaktualizowano kategorię');
  } else {
    const { error } = await sb.from('categories').insert({nazwa, opis});
    if (error) { toast('Błąd: '+error.message,'error'); return; }
    toast('Dodano kategorię');
  }
  state.modal=null; state._catEditId=null;
  await loadCategories(); render();
}

function openCatEdit(id) { state._catEditId=id; state.modal='cat-edit'; render(); }

async function confirmDeleteCat(id, nazwa) {
  const count = state.items.filter(i=>i.kategoria===nazwa).length;
  const msg = count>0
    ? `Kategoria "${nazwa}" jest używana przez ${count} pozycji sprzętu. Usunięcie nie wyczyści ich kategorii — pozostaną z nieistniejącą kategorią. Kontynuować?`
    : `Usunąć kategorię "${nazwa}"?`;
  if (!confirm(msg)) return;
  await sb.from('categories').delete().eq('id', id);
  toast('Usunięto kategorię');
  await loadCategories(); render();
}

// ─── BIND EVENTS ───
function bindEvents() {
  const si = document.getElementById('search-input');
  if (si) si.addEventListener('input', e => { state.search = e.target.value; render(); });
  const kf = document.getElementById('kat-filter');
  if (kf) kf.addEventListener('change', e => { state.filterKat = e.target.value; render(); });
  const sf = document.getElementById('stan-filter');
  if (sf) sf.addEventListener('change', e => { state.filterStan = e.target.value; render(); });
}

// ─── HELPERS ───
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badgeHtml(stan) {
  const map = { 'OK':'badge-ok','Niski stan':'badge-low','Brak':'badge-brak','W naprawie':'badge-repair' };
  return `<span class="badge ${map[stan]||''}">${esc(stan)}</span>`;
}
function ico(name) {
  const icons = {
    box: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="10" rx="1"/><path d="M1 4l2-3h10l2 3"/><path d="M5.5 4v2.5a2.5 2.5 0 005 0V4"/></svg>`,
    calendar: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="12" rx="1"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>`,
    clock: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 2"/></svg>`,
    tag: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h6l7 7-6 6-7-7V1z"/><circle cx="4.5" cy="4.5" r="1" fill="currentColor" stroke="none"/></svg>`,
    theme: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>`,
    moon: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 10A6 6 0 016 2.5a6 6 0 100 11 6 6 0 007.5-3.5z"/></svg>`,
  };
  return icons[name] || '';
}

// ─── THEME ───
function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  document.documentElement.className = next;
  localStorage.setItem('eq_theme', next);
  render();
}

function initTheme() {
  const saved = localStorage.getItem('eq_theme') || 'dark';
  document.documentElement.className = saved;
}

initTheme();

// ─── INIT ───
if (SUPABASE_URL !== 'TWOJ_SUPABASE_URL' && state.currentUser) {
  loadAll();
} else {
  render();
}
</script>
</body>
</html>
