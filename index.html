<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprzęt Eventowy — Inwentaryzacja</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ─── KONFIGURACJA: wklej swoje klucze tutaj ─── */
/* Patrz: README / sekcja konfiguracji poniżej     */

:root {
  --radius: 10px;
  --radius-lg: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --accent: #7c6af7;
  --accent2: #a598ff;
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.12);
  --purple: #c084fc;
  --purple-bg: rgba(192,132,252,0.12);
}

/* ─── DARK (domyślny) ─── */
html.dark {
  --bg: #0f0f11;
  --bg2: #18181c;
  --bg3: #222228;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eff4;
  --text2: #9997a8;
  --text3: #5e5c6e;
}

/* ─── LIGHT ─── */
html.light {
  --bg: #f5f4f7;
  --bg2: #ffffff;
  --bg3: #eeedf2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #111018;
  --text2: #5c5a6e;
  --text3: #9997a8;
  --green: #16a05e;
  --green-bg: rgba(22,160,94,0.10);
  --amber: #b45309;
  --amber-bg: rgba(180,83,9,0.10);
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.10);
  --purple: #7c3aed;
  --purple-bg: rgba(124,58,237,0.10);
  --accent: #5b4de0;
  --accent2: #4338ca;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ─── LAYOUT ─── */
.layout { display: block; min-height: 100vh; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; width: 220px; height: 100vh; z-index: 100; }
.main { margin-left: 220px; padding: 32px 36px; min-width: 0; box-sizing: border-box; }

/* ─── SIDEBAR ─── */
.logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
.logo-mark { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.logo-name { font-size: 16px; font-weight: 600; }
.nav { padding: 16px 12px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(124,106,247,0.15); color: var(--accent2); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-section { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 14px 12px 6px; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.user-row { display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(124,106,247,0.25); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--accent2); flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; }
.user-role { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* ─── TOPBAR ─── */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 22px; font-weight: 600; }
.page-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
.topbar-actions { display: flex; gap: 8px; }

/* ─── BUTTONS ─── */
.btn { height: 36px; padding: 0 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; color: var(--text); font-family: var(--font); font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: rgba(255,255,255,0.25); background: var(--bg3); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-sm { height: 30px; padding: 0 12px; font-size: 13px; }
.btn-ghost { border-color: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--bg3); border-color: var(--border); }
.btn-danger { color: var(--red); border-color: rgba(248,113,113,0.25); }
.btn-danger:hover { background: var(--red-bg); }
.btn svg { width: 14px; height: 14px; }

/* ─── STATS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; cursor: pointer; transition: border-color .15s, transform .1s; }
.stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.stat-card.active { border-width: 2px; }
.stat-card.s-ok.active { border-color: var(--green); }
.stat-card.s-low.active { border-color: var(--amber); }
.stat-card.s-repair.active { border-color: var(--purple); }
.stat-card.s-total.active { border-color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; margin-bottom: 8px; }
.stat-val { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.stat-card.s-ok .stat-val { color: var(--green); }
.stat-card.s-low .stat-val { color: var(--amber); }
.stat-card.s-repair .stat-val { color: var(--purple); }
.stat-card.s-total .stat-val { color: var(--text); }

/* ─── FILTERS ─── */
.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filters input, .filters select { height: 36px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; padding: 0 12px; outline: none; transition: border-color .15s; }
.filters input { flex: 1; min-width: 200px; }
.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--text3); }
.filters select option { background: var(--bg2); }

/* ─── TABLE ─── */
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: .07em; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg2); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
td { padding: 12px 16px; vertical-align: middle; }
td.name { font-weight: 500; }
td.mono { font-family: var(--mono); font-size: 12px; color: var(--text2); }
td.muted { color: var(--text2); font-size: 13px; }
.empty { padding: 60px 20px; text-align: center; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ─── BADGES ─── */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--mono); }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.badge-stock { background: rgba(99,179,237,0.12); color: #63b3ed; }
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-ok::before { background: var(--green); }
.badge-low { background: var(--amber-bg); color: var(--amber); }
.badge-low::before { background: var(--amber); }
.badge-brak { background: var(--red-bg); color: var(--red); }
.badge-brak::before { background: var(--red); }
.badge-repair { background: var(--purple-bg); color: var(--purple); }
.badge-repair::before { background: var(--purple); }

/* ─── MODAL ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; }
.modal-close:hover { color: var(--text); background: var(--bg3); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ─── FORM ─── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text2); font-family: var(--mono); letter-spacing: .05em; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; padding: 9px 12px; outline: none; transition: border-color .15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg2); }
.field textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

/* ─── HISTORY PANEL ─── */
.history-list { display: flex; flex-direction: column; gap: 0; }
.history-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
.hist-body { flex: 1; }
.hist-action { font-size: 13px; font-weight: 500; }
.hist-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 3px; }
.hist-detail { font-size: 12px; color: var(--text2); margin-top: 4px; background: var(--bg3); padding: 6px 10px; border-radius: 6px; font-family: var(--mono); }

/* ─── TABS ─── */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
.tab { padding: 7px 18px; border-radius: 7px; cursor: pointer; font-size: 14px; color: var(--text2); border: none; background: none; font-family: var(--font); transition: all .15s; }
.tab.active { background: var(--bg3); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

/* ─── CONFIG SCREEN ─── */
.config-screen { max-width: 560px; margin: 60px auto; }
.config-screen h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.config-screen p { color: var(--text2); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.config-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
.config-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
.code-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--accent2); margin-bottom: 20px; white-space: pre; overflow-x: auto; line-height: 1.7; }
.step { display: flex; gap: 14px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(124,106,247,0.2); color: var(--accent2); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--mono); }
.step-content h3 { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
.step-content p { font-size: 13px; color: var(--text2); line-height: 1.6; }
.step-content a { color: var(--accent2); }

/* ─── SPINNER ─── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }

/* ─── TOAST ─── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; animation: slideIn .2s ease; min-width: 240px; }
.toast.success { border-color: rgba(52,211,153,.3); }
.toast.error { border-color: rgba(248,113,113,.3); color: var(--red); }
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── EVENT TAG ─── */
.event-tag { display: inline-flex; align-items: center; gap: 5px; background: rgba(124,106,247,.15); color: var(--accent2); font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 4px; }
.ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; flex-shrink: 0; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

/* ─── THEME TOGGLE ─── */
.theme-toggle { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; }
.theme-toggle:hover { background:var(--bg3); color:var(--text); }
.theme-toggle svg { width:15px; height:15px; }

/* ─── CALENDAR ─── */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-head { font-size: 11px; font-family: var(--mono); color: var(--text3); text-align: center; padding: 6px 0; }
.cal-day { min-height: 80px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; }
.cal-day.other-month { opacity: .4; }
.cal-day.today { border-color: var(--accent); }
.cal-day-num { font-size: 12px; font-family: var(--mono); color: var(--text3); margin-bottom: 4px; }
.cal-event { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-event:hover { opacity: .8; }
/* ─── CHECKLIST ─── */
.check-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.check-item:last-child { border-bottom: none; }
.check-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.check-item label { font-size: 14px; cursor: pointer; flex: 1; }
.check-item.done label { text-decoration: line-through; color: var(--text3); }
/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px 16px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
const SUPABASE_URL    = 'https://yxbwhwmntvdzvwlanczf.supabase.co';
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Yndod21udHZkenZ3bGFuY3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzYwMzMsImV4cCI6MjA5MTcxMjAzM30.-zqRhNYSwcIqsZU7HTt5dpbbNypFUq7Fz1_dZ4xwXoA';
const APP_VERSION     = '1.3.0';
const ALLOWED_DOMAIN  = 'topart.pl';
const EVENT_COLORS = ['#7c6af7','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a78bfa','#34d3d3','#fb923c','#a3e635'];
const ADMIN_EMAILS    = [];  // np. ['adam@topart.pl'] — admini mogą edytować i usuwać
</script>

<!-- ════ APP ════ -->
<div id="app"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ─── SUPABASE INIT ───
let sb;
try {
  if (SUPABASE_URL !== 'TWOJ_SUPABASE_URL') {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { redirectTo: window.location.href }
    });
  }
} catch(e) { console.error('Supabase init error:', e); }

// ─── STATE ───
let state = {
  view: 'inventory',
  items: [],
  history: [],
  events: [],
  categories: [],
  users: [],
  clients: [],
  loading: true,
  authLoading: true,
  search: '',
  filterKat: '',
  filterStan: '',
  modal: null,
  editItem: null,
  detailItem: null,
  authUser: null,
  isAdmin: false,
  selectedEventId: null,
  selectedClientId: null,
  evSearch: '',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
};

function getUserName() {
  if (!state.authUser) return '';
  return state.authUser.user_metadata?.full_name || state.authUser.email || '';
}
function getUserInitials() {
  const n = getUserName();
  return n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '??';
}
function checkAdmin() {
  if (!state.authUser) return false;
  // Sprawdź rolę z profilu
  const profile = (state.users||[]).find(u => u.email === state.authUser.email);
  if (profile) return profile.role === 'admin';
  // Fallback: lista adminów w kodzie
  if (ADMIN_EMAILS.length > 0) return ADMIN_EMAILS.includes(state.authUser.email);
  return true; // jeśli brak profilu i brak listy — traktuj jako admin (pierwszy użytkownik)
}

async function syncUserProfile(user) {
  // Utwórz lub zaktualizuj profil użytkownika przy logowaniu
  const { data } = await sb.from('user_profiles').select('*').eq('email', user.email).single();
  if (!data) {
    // Pierwszy raz — utwórz profil (domyślna rola: admin dla pierwszego, user dla kolejnych)
    const { count } = await sb.from('user_profiles').select('*', {count:'exact',head:true});
    const role = (count === 0) ? 'admin' : 'user';
    await sb.from('user_profiles').insert({
      email: user.email,
      full_name: user.user_metadata?.full_name || user.email.split('@')[0],
      role,
      auth_id: user.id
    });
  } else {
    // Zaktualizuj auth_id jeśli brak
    if (!data.auth_id) await sb.from('user_profiles').update({ auth_id: user.id }).eq('email', user.email);
  }
  // Załaduj świeże dane profilu
  await loadUsers();
}

// ─── TOAST ───
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':'✕'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── DB HELPERS ───
async function loadItems() {
  if (!sb) return;
  const { data, error } = await sb.from('equipment').select('*').order('created_at', { ascending: false });
  if (!error) state.items = data || [];
}

async function loadHistory() {
  if (!sb) return;
  const { data, error } = await sb.from('equipment_history').select('*').order('created_at', { ascending: false }).limit(200);
  if (!error) state.history = data || [];
}

async function loadEvents() {
  if (!sb) return;
  const { data, error } = await sb.from('events').select('*').order('date_start', { ascending: false });
  if (!error) state.events = data || [];
}

async function loadCategories() {
  if (!sb) return;
  const { data, error } = await sb.from('categories').select('*').order('nazwa');
  if (!error) state.categories = data || [];
}

async function loadUsers() {
  if (!sb || !state.isAdmin) return;
  const { data, error } = await sb.from('user_profiles').select('*').order('created_at');
  if (!error) state.users = data || [];
}

async function loadClients() {
  if (!sb) return;
  const { data, error } = await sb.from('clients').select('*').order('nazwa');
  if (!error) state.clients = data || [];
}

async function loadAll() {
  state.loading = true; render();
  await Promise.all([loadItems(), loadHistory(), loadEvents(), loadCategories(), loadUsers(), loadClients()]);
  state.loading = false; render();
}

async function saveItem(item, isEdit) {
  if (!sb) { toast('Brak połączenia z bazą', 'error'); return false; }
  const user = getUserName() || 'nieznany';
  if (isEdit) {
    const old = state.items.find(i => i.id === item.id);
    const { error } = await sb.from('equipment').update(item).eq('id', item.id);
    if (error) { toast('Błąd zapisu: ' + error.message, 'error'); return false; }
    // historia
    const changes = [];
    ['nazwa','kategoria','ilosc','stan','lokalizacja','sn','event_id','uwagi'].forEach(k => {
      if (String(old[k]||'') !== String(item[k]||'')) changes.push(`${k}: "${old[k]||''}" → "${item[k]||''}"`);
    });
    await sb.from('equipment_history').insert({ equipment_id: item.id, action: 'edycja', user_name: user, details: changes.join('; ') || 'brak zmian' });
    toast('Zapisano zmiany');
  } else {
    const { data, error } = await sb.from('equipment').insert(item).select().single();
    if (error) { toast('Błąd zapisu: ' + error.message, 'error'); return false; }
    await sb.from('equipment_history').insert({ equipment_id: data.id, action: 'dodanie', user_name: user, details: `Dodano: ${item.nazwa}` });
    toast('Dodano sprzęt');
  }
  return true;
}

async function deleteItem(id) {
  if (!sb) return;
  const item = state.items.find(i => i.id === id);
  await sb.from('equipment_history').insert({ equipment_id: id, action: 'usunięcie', user_name: getUserName() || 'nieznany', details: `Usunięto: ${item?.nazwa}` });
  await sb.from('equipment').delete().eq('id', id);
  toast('Usunięto pozycję');
  await loadItems(); await loadHistory(); render();
}

async function saveEvent(ev) {
  if (!sb) return false;
  const { error } = await sb.from('events').insert(ev);
  if (error) { toast('Błąd: ' + error.message, 'error'); return false; }
  toast('Dodano event');
  return true;
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  if (!SUPABASE_URL || SUPABASE_URL === 'TWOJ_SUPABASE_URL') {
    app.innerHTML = renderConfig(); return;
  }
  if (state.authLoading) {
    app.innerHTML = `<div class="loading" style="min-height:100vh"><div class="spinner"></div></div>`; return;
  }
  if (!state.authUser) {
    app.innerHTML = renderLoginScreen(); return;
  }
  app.innerHTML = `
    <div class="layout">
      ${renderSidebar()}
      <main class="main">
        ${renderMain()}
      </main>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
  bindEvents();
}

      <div style="text-align:right;margin:-6px 0 16px">
        <button class="btn btn-ghost" style="font-size:12px;height:auto;padding:4px 0;border:none" onclick="showForgotPassword()">Zapomniałem hasła</button>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;height:42px" onclick="doLogin()">Zaloguj się →</button>
      `}
      <div id="login-msg" style="margin-top:14px;font-size:13px;text-align:center;display:none"></div>

async function doLogin() {
  const email = document.getElementById('l-email')?.value?.trim();
  const pass  = document.getElementById('l-pass')?.value;
  if (!email || !pass) { showLoginMsg('Wypełnij email i hasło.', 'error'); return; }
  if (!email.endsWith('@' + ALLOWED_DOMAIN)) { showLoginMsg('Tylko konta @' + ALLOWED_DOMAIN, 'error'); return; }
  showLoginMsg('Logowanie...', 'info');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showLoginMsg(error.message === 'Invalid login credentials' ? 'Błędny email lub hasło.' : error.message, 'error');
}

async function doResetPassword() {
  const pass = document.getElementById('l-newpass')?.value;
  if (!pass || pass.length < 8) { showLoginMsg('Hasło musi mieć min. 8 znaków.', 'error'); return; }
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) { showLoginMsg(error.message, 'error'); return; }
  showLoginMsg('Hasło ustawione! Przekierowuję...', 'success');
  setTimeout(() => { window.location.hash = ''; render(); }, 1500);
}

async function showForgotPassword() {
  const email = document.getElementById('l-email')?.value?.trim();
  if (!email) { showLoginMsg('Wpisz najpierw email.', 'error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if (error) { showLoginMsg(error.message, 'error'); return; }
  showLoginMsg('Wysłano link resetujący na ' + email, 'success');
}

function showLoginMsg(msg, type='info') {
  const el = document.getElementById('login-msg');
  if (!el) return;
  el.style.display = 'block';
  el.style.color = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--text2)';
  el.textContent = msg;
}

async function toggleEventAssign(itemId, eventId, assign) {
  if (!sb) return;
  const newEventId = assign ? eventId : null;
  const { error } = await sb.from('equipment').update({ event_id: newEventId }).eq('id', itemId);
  if (error) { toast('Błąd: '+error.message,'error'); return; }
  const item = state.items.find(i=>i.id===itemId);
  if (item) item.event_id = newEventId;
  const user = getUserName()||'nieznany';
  const ev = state.events.find(e=>e.id===eventId);
  await sb.from('equipment_history').insert({
    equipment_id: itemId, action: assign?'przypisano do eventu':'odpisano z eventu',
    user_name: user, details: `Event: ${ev?.nazwa||eventId}`
  });
  await loadItems(); render();
}

async function unassignFromEvent(itemId) {
  await toggleEventAssign(itemId, null, false);
}

// ─── ACTIONS ───
function openModal(type) { state.modal = type; render(); }
function closeModal(e) { if (e && e.target !== e.currentTarget) return; state.modal=null; state.editItem=null; render(); }
function openEdit(id) { state.editItem = state.items.find(i=>i.id===id); state.modal='edit'; render(); }
function openDetail(id) { state.detailItem = state.items.find(i=>i.id===id); state.modal='detail'; render(); }

  state.filterStan = state.filterStan === stan ? '' : stan;

}
async function logout() {
  await sb.auth.signOut();
  state.authUser = null;
  state.isAdmin = false;
  render();
}

async function submitItem() {
  const nazwa = document.getElementById('f-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę sprzętu','error'); return; }
  const item = {
    nazwa,
    kategoria: document.getElementById('f-kat').value||null,
    ilosc: parseInt(document.getElementById('f-ilosc').value)||1,
    stan: document.getElementById('f-stan').value,
    lokalizacja: document.getElementById('f-lok').value.trim()||null,
    sn: document.getElementById('f-sn').value.trim()||null,
    event_id: document.getElementById('f-event').value||null,
    data_wypozyczenia: document.getElementById('f-wyp').value||null,
    data_zwrotu: document.getElementById('f-zwrot').value||null,
    uwagi: document.getElementById('f-uwagi').value.trim()||null,
  };
  if (state.modal === 'edit') item.id = state.editItem.id;
  const ok = await saveItem(item, state.modal==='edit');
  if (ok) { state.modal=null; state.editItem=null; await loadItems(); await loadHistory(); render(); }
}

function selectEventColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('e-color').value = el.dataset.color;
}

async function submitEvent(isEdit=false) {
  const nazwa = document.getElementById('e-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę eventu','error'); return; }
  const ev = {
    nazwa,
    miasto: document.getElementById('e-miasto').value.trim()||null,
    date_start: document.getElementById('e-start').value||null,
    date_end: document.getElementById('e-end').value||null,
    uwagi: document.getElementById('e-uwagi').value.trim()||null,
    kolor: document.getElementById('e-color')?.value || EVENT_COLORS[0],
    client_id: document.getElementById('e-client')?.value || null,
  };
  if (isEdit) {
    const { error } = await sb.from('events').update(ev).eq('id', state._editEventId);
    if (error) { toast('Błąd: '+error.message,'error'); return; }
    toast('Zaktualizowano event');
  } else {
    const ok = await saveEvent(ev);
    if (!ok) return;
  }
  state.modal=null; state._editEventId=null;
  await loadEvents(); render();
}

async function confirmDeleteEvent(id) {
  const ev = state.events.find(e=>e.id===id);
  const count = state.items.filter(i=>i.event_id===id).length;
  const msg = count > 0
    ? `Event "${ev?.nazwa}" ma ${count} przypisanych pozycji sprzętu. Usunięcie eventu odepnie sprzęt. Kontynuować?`
    : `Usunąć event "${ev?.nazwa}"?`;
  if (!confirm(msg)) return;
  if (count > 0) await sb.from('equipment').update({event_id: null}).eq('event_id', id);
  await sb.from('events').delete().eq('id', id);
  toast('Usunięto event');
  state.modal=null; state._editEventId=null;
  await loadEvents(); await loadItems(); render();
}

function confirmDelete(id) {
  if (confirm('Na pewno usunąć tę pozycję? Operacja jest nieodwracalna.')) deleteItem(id);
}

function exportCSV() {
  if (!state.items.length) { toast('Brak danych','error'); return; }
  const evMap = {};
  state.events.forEach(e => evMap[e.id] = e.nazwa);
  const head = ['Nazwa','Kategoria','Ilość','Stan','Lokalizacja','Nr seryjny','Event','Wypożyczono','Zwrot','Uwagi'];
  const rows = state.items.map(i => [
    i.nazwa, i.kategoria, i.ilosc, i.stan, i.lokalizacja, i.sn,
    i.event_id ? evMap[i.event_id]||'' : '', i.data_wypozyczenia, i.data_zwrotu, i.uwagi
  ].map(v => '"'+(v||'').toString().replace(/"/g,'""')+'"').join(','));
  const csv = '\uFEFF' + [head.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'sprzet_eventowy_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('Eksport gotowy');
}

// ─── DASHBOARD VIEW ───
function renderDashboard() {
  const now = new Date();
  const year = state.calYear;
  const month = state.calMonth;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const daysInMonth = lastDay.getDate();
  const prevDays = new Date(year, month, 0).getDate();
  const monthNames = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  const dayNames = ['Pon','Wt','Śr','Czw','Pt','Sob','Nie'];

  // Eventy w tym miesiącu
  const monthEvents = state.events.filter(e => {
    if (!e.date_start) return false;
    const s = new Date(e.date_start);
    const en = e.date_end ? new Date(e.date_end) : s;
    return s.getFullYear()===year && s.getMonth()===month ||
           en.getFullYear()===year && en.getMonth()===month ||
           (s < firstDay && en > lastDay);
  });

  // Buduj komórki
  let cells = [];
  for (let i = startDow - 1; i >= 0; i--) cells.push({day: prevDays-i, curr: false});
  for (let i = 1; i <= daysInMonth; i++) cells.push({day: i, curr: true});
  while (cells.length % 7 !== 0) cells.push({day: cells.length - daysInMonth - startDow + 1, curr: false});

  const todayD = now.getDate(), todayM = now.getMonth(), todayY = now.getFullYear();

  const cellsHtml = cells.map(c => {
    const isToday = c.curr && c.day===todayD && month===todayM && year===todayY;
    const cellDate = new Date(year, c.curr ? month : (c.day > 15 ? month-1 : month+1), c.day);
    const dayEvents = c.curr ? monthEvents.filter(e => {
      const s = new Date(e.date_start);
      const en = e.date_end ? new Date(e.date_end) : s;
      const cd = new Date(year, month, c.day);
      return cd >= new Date(s.toDateString()) && cd <= new Date(en.toDateString());
    }) : [];
    return `<div class="cal-day ${!c.curr?'other-month':''} ${isToday?'today':''}">
      <div class="cal-day-num">${c.day}</div>
      ${dayEvents.map(e=>`<div class="cal-event" style="background:${(e.kolor||'#7c6af7')}22;color:${e.kolor||'#7c6af7'};border:1px solid ${(e.kolor||'#7c6af7')}44"
        onclick="setView('events');openEventDetail('${e.id}')" title="${esc(e.nazwa)}">${esc(e.nazwa)}</div>`).join('')}
    </div>`;
  }).join('');

  const upcoming = state.events.filter(e => e.date_start && new Date(e.date_start) >= now)
    .sort((a,b) => new Date(a.date_start)-new Date(b.date_start)).slice(0,5);

  return `
    <div class="topbar">
      <div><div class="page-title">Dashboard</div><div class="page-subtitle">${monthNames[month]} ${year}</div></div>
      <div class="topbar-actions">
        <button class="btn" onclick="prevMonth()">←</button>
        <button class="btn" onclick="todayMonth()">Dziś</button>
        <button class="btn" onclick="nextMonth()">→</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start">
      <div>
        <div class="cal-grid" style="margin-bottom:4px">${dayNames.map(d=>`<div class="cal-head">${d}</div>`).join('')}</div>
        <div class="cal-grid">${cellsHtml}</div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;margin-bottom:10px">NADCHODZĄCE EVENTY</div>
        ${!upcoming.length ? `<div style="color:var(--text3);font-size:13px">Brak nadchodzących eventów</div>` :
          upcoming.map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="setView('events');openEventDetail('${e.id}')">
            <span style="width:4px;height:36px;border-radius:2px;background:${e.kolor||'#7c6af7'};flex-shrink:0"></span>
            <div>
              <div style="font-size:14px;font-weight:500">${esc(e.nazwa)}</div>
              <div style="font-size:12px;color:var(--text3);font-family:var(--mono)">${e.date_start||''}${e.date_end&&e.date_end!==e.date_start?' – '+e.date_end:''} ${e.miasto?'· '+e.miasto:''}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function prevMonth() { if(state.calMonth===0){state.calMonth=11;state.calYear--;}else{state.calMonth--;} render(); }
function nextMonth() { if(state.calMonth===11){state.calMonth=0;state.calYear++;}else{state.calMonth++;} render(); }
function todayMonth() { state.calMonth=new Date().getMonth(); state.calYear=new Date().getFullYear(); render(); }

async function submitClient(isEdit=false) {
  const nazwa = document.getElementById('cl-nazwa')?.value?.trim();
  if (!nazwa) { toast('Podaj nazwę klienta','error'); return; }
  const cl = {
    nazwa,
    kontakt: document.getElementById('cl-kontakt').value.trim()||null,
    telefon: document.getElementById('cl-tel').value.trim()||null,
    email: document.getElementById('cl-email').value.trim()||null,
    adres: document.getElementById('cl-adres').value.trim()||null,
    uwagi: document.getElementById('cl-uwagi').value.trim()||null,
  };
  if (isEdit) {
    const { error } = await sb.from('clients').update(cl).eq('id', state._editClientId);
    if (error) { toast('Błąd: '+error.message,'error'); return; }
    toast('Zaktualizowano klienta');
  } else {
    const { error } = await sb.from('clients').insert(cl);
    if (error) { toast('Błąd: '+error.message,'error'); return; }
    toast('Dodano klienta');
  }
  state.modal=null; state._editClientId=null;
  await loadClients(); render();
}

async function confirmDeleteClient(id) {
  if (!confirm('Usunąć klienta? Eventy pozostaną bez przypisanego klienta.')) return;
  await sb.from('events').update({client_id:null}).eq('client_id',id);
  await sb.from('clients').delete().eq('id',id);
  toast('Usunięto klienta');
  state.modal=null; state.selectedClientId=null;
  await loadClients(); await loadEvents(); render();
}

// ─── CHECKLIST VIEW ───
function renderChecklistModal() {
  const ev = state.events.find(e=>e.id===state._checklistEventId);
  if (!ev) return '';
  const assigned = state.items.filter(i=>i.event_id===ev.id);
  const checks = state._checklistData || {};
  const stages = ['Spakowano','Załadowano','Zwrócono'];

  return `<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
      <div class="modal-header">
        <h3>Lista kontrolna — ${esc(ev.nazwa)}</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" style="padding:16px 24px">
        ${!assigned.length ? `<div class="empty"><div class="empty-icon">📦</div><p>Brak sprzętu przypisanego do tego eventu.</p></div>` : `
        <div style="display:grid;grid-template-columns:1fr repeat(3,80px);gap:0;margin-bottom:8px">
          <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">SPRZĘT</div>
          ${stages.map(s=>`<div style="font-size:11px;color:var(--text3);font-family:var(--mono);text-align:center">${s.toUpperCase()}</div>`).join('')}
        </div>
        ${assigned.map(i => {
          const key = ev.id+'_'+i.id;
          const row = checks[key] || {};
          return `<div style="display:grid;grid-template-columns:1fr repeat(3,80px);align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:14px;font-weight:500">${esc(i.nazwa)}<span style="font-size:12px;color:var(--text3);margin-left:6px">×${i.ilosc}</span></div>
            ${stages.map(s=>`<div style="text-align:center">
              <input type="checkbox" ${row[s]?'checked':''} onchange="toggleCheck('${key}','${s}',this.checked)"
                style="width:18px;height:18px;cursor:pointer;accent-color:var(--accent)">
            </div>`).join('')}
          </div>`;
        }).join('')}`}
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Zamknij</button>
        <button class="btn btn-primary" onclick="saveChecklist()">Zapisz</button>
      </div>
    </div>
  </div>`;
}

async function openChecklist(eventId) {
  state._checklistEventId = eventId;
  // Załaduj zapisane dane
  try {
    const r = await window.storage?.get('checklist_'+eventId);
    state._checklistData = r ? JSON.parse(r.value) : {};
  } catch(e) { state._checklistData = {}; }
  state.modal = 'checklist'; render();
}

function toggleCheck(key, stage, val) {
  if (!state._checklistData) state._checklistData = {};
  if (!state._checklistData[key]) state._checklistData[key] = {};
  state._checklistData[key][stage] = val;
}

async function saveChecklist() {
  try {
    await window.storage?.set('checklist_'+state._checklistEventId, JSON.stringify(state._checklistData));
  } catch(e) {}
  toast('Zapisano listę kontrolną');
  state.modal = null; render();
}

function bindEvents() {

async function submitInvite() {
  const email = document.getElementById('inv-email')?.value?.trim();
  const name  = document.getElementById('inv-name')?.value?.trim();
  const role  = document.getElementById('inv-role')?.value;
  if (!email) { toast('Podaj email','error'); return; }
  if (!email.endsWith('@' + ALLOWED_DOMAIN)) { toast('Tylko konta @' + ALLOWED_DOMAIN,'error'); return; }
  // Zapisz profil w bazie (użytkownik zostanie utworzony przy pierwszym logowaniu)
  const { error } = await sb.from('user_profiles').upsert({ email, full_name: name||null, role }, { onConflict: 'email' });
  if (error) { toast('Błąd: '+error.message,'error'); return; }
  // Wyślij invite przez Supabase Auth (wymaga service role — zamiast tego użyj reset password)
  const { error: e2 } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if (e2 && !e2.message.includes('not found')) { toast('Błąd wysyłki: '+e2.message,'error'); return; }
  toast('Zaproszenie wysłane na '+email);
  state.modal = null;
  await loadUsers(); render();
}

async function updateRole(id, role) {
  const { error } = await sb.from('user_profiles').update({ role }).eq('id', id);
  if (error) { toast('Błąd: '+error.message,'error'); return; }
  toast('Zaktualizowano rolę');
  await loadUsers();
  // Odśwież własną rolę jeśli zmieniono siebie
  const u = (state.users||[]).find(x=>x.id===id);
  if (u?.email === state.authUser?.email) {
    state.isAdmin = role === 'admin';
  }
  render();
}

async function removeUser(id, email) {
  if (!confirm(`Usunąć użytkownika ${email}?`)) return;
  await sb.from('user_profiles').delete().eq('id', id);
  toast('Usunięto użytkownika');
  await loadUsers(); render();
}

// ─── IMPORT CSV/EXCEL ───
function renderImportModal() {
  return `<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:480px">
      <div class="modal-header">
        <h3>Import sprzętu z pliku</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="background:var(--bg3);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7">
          Plik CSV lub Excel (.xlsx) musi mieć nagłówki w pierwszym wierszu.<br>
          Obsługiwane kolumny: <span style="font-family:var(--mono);color:var(--accent2)">nazwa, kategoria, ilosc, stan, lokalizacja, sn, uwagi</span><br>
          Kolumna <span style="font-family:var(--mono);color:var(--accent2)">nazwa</span> jest wymagana.
        </div>
        <div class="field">
          <label>Wybierz plik CSV lub Excel</label>
          <input type="file" id="import-file" accept=".csv,.xlsx,.xls" style="padding:8px 0;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:14px;width:100%">
        </div>
        <div id="import-preview" style="margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Anuluj</button>
        <button class="btn btn-primary" onclick="executeImport()">Importuj</button>
      </div>
    </div>
  </div>`;
}

let importRows = [];

function handleImportFile() {
  const file = document.getElementById('import-file')?.files?.[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const preview = document.getElementById('import-preview');

  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      importRows = parseCSV(text);
      showImportPreview(preview);
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    if (typeof XLSX === 'undefined') {
      preview.innerHTML = '<div style="color:var(--red);font-size:13px">Biblioteka XLSX nie załadowana. Użyj formatu CSV.</div>';
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {defval:''});
        importRows = data.map(row => normalizeRow(row));
        showImportPreview(preview);
      } catch(err) {
        preview.innerHTML = `<div style="color:var(--red);font-size:13px">Błąd odczytu pliku: ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  }
}

function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if (!lines.length) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i]||'');
    return normalizeRow(obj);
  }).filter(r=>r.nazwa);
}

function normalizeRow(row) {
  const get = (...keys) => { for(const k of keys){ const v = row[k]||row[k.toLowerCase()]||''; if(v) return String(v).trim(); } return ''; };
  const stany = ['Na stanie','OK','Niski stan','Brak','W naprawie'];
  let stan = get('stan','Stan','STATUS','status') || 'Na stanie';
  if (!stany.includes(stan)) stan = 'Na stanie';
  return {
    nazwa: get('nazwa','Nazwa','NAME','name'),
    kategoria: get('kategoria','Kategoria','KATEGORIA') || null,
    ilosc: parseInt(get('ilosc','ilość','Ilość','QTY','qty','quantity'))||1,
    stan,
    lokalizacja: get('lokalizacja','Lokalizacja','LOKALIZACJA') || null,
    sn: get('sn','SN','Nr seryjny','nr seryjny','serial') || null,
    uwagi: get('uwagi','Uwagi','UWAGI','notes') || null,
  };
}

function showImportPreview(container) {
  if (!importRows.length) {
    container.innerHTML = '<div style="color:var(--red);font-size:13px">Nie znaleziono danych. Sprawdź czy plik ma kolumnę "nazwa".</div>';
    return;
  }
  container.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Znaleziono <strong style="color:var(--green)">${importRows.length}</strong> pozycji do importu:</div>
  <div style="max-height:160px;overflow-y:auto;background:var(--bg3);border-radius:var(--radius);padding:8px 12px">
    ${importRows.slice(0,8).map(r=>`<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">${esc(r.nazwa)} <span style="color:var(--text3)">× ${r.ilosc}</span></div>`).join('')}
    ${importRows.length>8?`<div style="font-size:12px;color:var(--text3);padding:4px 0">...i ${importRows.length-8} więcej</div>`:''}
  </div>`;
}

async function executeImport() {
  if (!importRows.length) { toast('Najpierw wybierz plik','error'); return; }
  if (!sb) { toast('Brak połączenia z bazą','error'); return; }
  let ok=0, fail=0;
  const user = getUserName() || 'import';
  for (const row of importRows) {
    const { data, error } = await sb.from('equipment').insert(row).select().single();
    if (!error) {
      ok++;
      await sb.from('equipment_history').insert({ equipment_id: data.id, action: 'import', user_name: user, details: `Import z pliku: ${row.nazwa}` });
    } else { fail++; }
  }
  toast(`Zaimportowano ${ok} pozycji${fail?', błędy: '+fail:''}`, fail?'error':'success');
  importRows = [];
  state.modal = null;
  await loadItems(); await loadHistory(); render();
}

// ─── PDF REPORT ───
function generatePDF() {
  const evMap = {};
  state.events.forEach(e => evMap[e.id] = e.nazwa);
  const date = new Date().toLocaleDateString('pl-PL');
  const rows = state.items.map(i => `
    <tr>
      <td>${esc(i.nazwa)}</td>
      <td>${esc(i.kategoria||'—')}</td>
      <td style="text-align:center">${i.ilosc}</td>
      <td>${esc(i.stan)}</td>
      <td>${esc(i.lokalizacja||'—')}</td>
      <td>${esc(i.sn||'—')}</td>
      <td>${i.event_id && evMap[i.event_id] ? esc(evMap[i.event_id]) : '—'}</td>
      <td>${esc(i.uwagi||'—')}</td>
    </tr>`).join('');
  const html = `<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8">
  <title>Raport inwentaryzacji</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 11px; color: #111; margin: 20px; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .meta { color: #666; font-size: 11px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a2e; color: #fff; padding: 7px 8px; text-align: left; font-size: 10px; letter-spacing: .05em; }
    td { padding: 6px 8px; border-bottom: 1px solid #e5e5e5; vertical-align: top; }
    tr:nth-child(even) td { background: #f9f9f9; }
    .badge { display:inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    @media print { body { margin: 0; } }
  </style></head><body>
  <h1>Raport inwentaryzacji sprzętu eventowego</h1>
  <div class="meta">Wygenerowano: ${date} · Łącznie pozycji: ${state.items.length} · Użytkownik: ${getUserName()}</div>
  <table>
    <thead><tr><th>Nazwa</th><th>Kategoria</th><th>Ilość</th><th>Stan</th><th>Lokalizacja</th><th>Nr seryjny</th><th>Event</th><th>Uwagi</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

// ─── THEME ───
function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  document.documentElement.className = next;
  localStorage.setItem('eq_theme', next);
  render();
}

function initTheme() {
  const saved = localStorage.getItem('eq_theme') || 'dark';
  document.documentElement.className = saved;
}

initTheme();

// ─── INIT ───
async function initAuth() {
  if (!sb) { state.authLoading = false; render(); return; }

  // Obsłuż powrót po OAuth redirect
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    const email = session.user.email || '';
    if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
      await sb.auth.signOut();
      toast('Brak dostępu. Wymagane konto @' + ALLOWED_DOMAIN, 'error');
      state.authLoading = false; render(); return;
    }
    state.authUser = session.user;
    await syncUserProfile(session.user);
    state.isAdmin = checkAdmin();
  }
  state.authLoading = false;

  // Nasłuchuj zmian sesji
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const email = session.user.email || '';
      if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
        await sb.auth.signOut();
        toast('Brak dostępu. Wymagane konto @' + ALLOWED_DOMAIN, 'error');
        state.authUser = null; state.isAdmin = false; render(); return;
      }
      state.authUser = session.user;
      await syncUserProfile(session.user);
      state.isAdmin = checkAdmin();
      if (event === 'SIGNED_IN') { await loadAll(); return; }
    } else {
      state.authUser = null; state.isAdmin = false;
    }
    render();
  });

  if (state.authUser) {
    await loadAll();
  } else {
    render();
  }
}

initAuth();
</script>
